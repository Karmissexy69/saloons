spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/salonpos}
    username: ${SPRING_DATASOURCE_USERNAME:myuser}
    password: ${SPRING_DATASOURCE_PASSWORD:mypassword}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: INFO

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-secret-change-this-secret-2026}
    expiration-seconds: ${APP_JWT_EXPIRATION_SECONDS:3600}
  terminal:
    enabled: ${APP_TERMINAL_ENABLED:${APP_ATTENDANCE_TERMINAL_ENABLED:true}}
    username: ${APP_TERMINAL_USERNAME:${APP_ATTENDANCE_TERMINAL_USERNAME:terminal}}
    password: ${APP_TERMINAL_PASSWORD:${APP_ATTENDANCE_TERMINAL_PASSWORD:password}}
  biometric:
    aws-region: ${APP_BIOMETRIC_AWS_REGION:ap-southeast-1}
    aws-access-key-id: ${AWS_ACCESS_KEY_ID:}
    aws-secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
    rekognition-collection-id: ${APP_BIOMETRIC_COLLECTION_ID:salonpos-staff-faces}
    s3-biometric-bucket: ${APP_BIOMETRIC_S3_BUCKET:files.workerflow.io}
    face-match-threshold: ${APP_BIOMETRIC_FACE_MATCH_THRESHOLD:80}
    verification-token-ttl-minutes: ${APP_BIOMETRIC_TOKEN_TTL_MINUTES:10}
    probe-purge-day-of-month: ${APP_BIOMETRIC_PROBE_PURGE_DAY_OF_MONTH:7}
  payment-proof:
    s3-bucket: ${APP_PAYMENT_PROOF_S3_BUCKET:${APP_BIOMETRIC_S3_BUCKET:files.workerflow.io}}
    key-prefix: ${APP_PAYMENT_PROOF_KEY_PREFIX:payment-proofs}
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    trust-forward-headers: ${APP_RATE_LIMIT_TRUST_FORWARD_HEADERS:false}
    rejection-message: ${APP_RATE_LIMIT_REJECTION_MESSAGE:Too many requests. Please try again later.}
    idle-eviction: ${APP_RATE_LIMIT_IDLE_EVICTION:24h}
    policies:
      login-ip:
        rejection-message: Too many login attempts from this network. Please try again later.
        limits:
          - capacity: 10
            refill-tokens: 10
            refill-period: 5m
          - capacity: 40
            refill-tokens: 40
            refill-period: 1h
      login-username:
        rejection-message: Too many login attempts for this account. Please try again later.
        limits:
          - capacity: 8
            refill-tokens: 8
            refill-period: 15m
          - capacity: 24
            refill-tokens: 24
            refill-period: 1h
      attendance-verify-face-ip:
        rejection-message: Too many face verification attempts from this device. Please wait and try again.
        limits:
          - capacity: 40
            refill-tokens: 40
            refill-period: 5m
          - capacity: 160
            refill-tokens: 160
            refill-period: 1h
      attendance-verify-face-staff:
        rejection-message: Too many verification attempts for this staff member. Please wait and try again.
        limits:
          - capacity: 8
            refill-tokens: 8
            refill-period: 5m
          - capacity: 20
            refill-tokens: 20
            refill-period: 1h
      attendance-action-staff:
        rejection-message: Too many attendance actions for this staff member. Please wait and try again.
        limits:
          - capacity: 12
            refill-tokens: 12
            refill-period: 5m
          - capacity: 40
            refill-tokens: 40
            refill-period: 1h
      staff-enroll-user:
        rejection-message: Too many staff enrollment attempts. Please try again later.
        limits:
          - capacity: 8
            refill-tokens: 8
            refill-period: 1h
          - capacity: 20
            refill-tokens: 20
            refill-period: 1d
      staff-reenroll-user:
        rejection-message: Too many face re-enrollment attempts. Please try again later.
        limits:
          - capacity: 8
            refill-tokens: 8
            refill-period: 1h
          - capacity: 20
            refill-tokens: 20
            refill-period: 1d
      staff-reenroll-target:
        rejection-message: This staff member has been re-enrolled too many times recently. Please try again later.
        limits:
          - capacity: 4
            refill-tokens: 4
            refill-period: 1h
          - capacity: 10
            refill-tokens: 10
            refill-period: 1d
      transactions-create:
        rejection-message: Too many checkout attempts from this device. Please wait and try again.
        limits:
          - capacity: 6
            refill-tokens: 6
            refill-period: 10s
          - capacity: 240
            refill-tokens: 240
            refill-period: 1h
      appointment-convert:
        rejection-message: Too many appointment billing attempts. Please wait and try again.
        limits:
          - capacity: 8
            refill-tokens: 8
            refill-period: 5m
          - capacity: 60
            refill-tokens: 60
            refill-period: 1h
      refunds-create:
        rejection-message: Too many refund attempts. Please wait and try again.
        limits:
          - capacity: 6
            refill-tokens: 6
            refill-period: 10m
          - capacity: 20
            refill-tokens: 20
            refill-period: 1h
      receipts-export:
        rejection-message: Too many receipt exports. Please wait and try again.
        limits:
          - capacity: 6
            refill-tokens: 6
            refill-period: 5m
          - capacity: 30
            refill-tokens: 30
            refill-period: 1h
      reports-sales-summary:
        rejection-message: Too many sales report requests. Please wait and try again.
        limits:
          - capacity: 60
            refill-tokens: 60
            refill-period: 5m
          - capacity: 300
            refill-tokens: 300
            refill-period: 1h
    
